# Two-process setup: the Python API (uvicorn) + the Next.js frontend.
#
#   docker compose up --build          # → http://localhost:3000
#
# For the single-process option (reference UI + API in one container), skip
# compose and run the backend image on its default command:
#
#   docker build -t clara . && docker run -p 8000:8000 clara   # → http://localhost:8000
#
# Set a real model provider by passing env, e.g. CLARA_PROVIDER / ANTHROPIC_API_KEY.
services:
  backend:
    build: .
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - CLARA_PROVIDER=${CLARA_PROVIDER:-mock}
      - CLARA_CHECK_PROVIDER=${CLARA_CHECK_PROVIDER:-}
      - CLARA_SYMBOLS=${CLARA_SYMBOLS:-arasaac}
      # Pass through provider keys if set in the host environment.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    expose:
      - "8000"
    ports:
      - "8000:8000"   # optional: reach the API directly

  web:
    build: ./web-next
    environment:
      - CLARA_API=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
