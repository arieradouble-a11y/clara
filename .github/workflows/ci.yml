name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install lint tools
        run: pip install -e ".[lint]"
      - name: Ruff
        run: ruff check clara api web tests
      - name: Mypy (engine)
        run: mypy clara
      - name: Reference UI inline JS syntax
        run: python scripts/check_ui_js.py

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + api + language extras)
        run: pip install -e ".[dev,api,ru,es,de,fr]"
      - name: Test
        run: python -m pytest -q

  web-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - run: npm ci
      - run: npm run build
